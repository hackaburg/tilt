version: "3"

services:
  proxy:
    image: nginx:alpine
    ports:
      - 8080:80
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - tilt
    networks:
      tilt_network:
        ipv4_address: 172.50.0.2

  tilt:
    build:
      context: .
      dockerfile: Dockerfile
    image: tilt
    environment:
      - BASE_URL=http://localhost:8080/apply/
      - PORT=3000
      - LOG_LEVEL=debug
      - LOG_FILENAME=tilt.log
      - MAIL_HOST=maildev
      - MAIL_PORT=465
      - MAIL_USERNAME=root@localhost
      - MAIL_PASSWORD=password
      - DATABASE_NAME=tilt
      - DATABASE_HOST=db
      - DATABASE_PASSWORD=this_is_not_secure_generate_something
      - DATABASE_PORT=3306
      - DATABASE_USERNAME=tilt
      - SECRET_JWT=wow_this_is_some_secure_password
    depends_on:
      - db
    networks:
      tilt_network:
        ipv4_address: 172.50.0.3

  db:
    image: mariadb:latest
    volumes:
      - ./db:/var/lib/mysql
    environment:
      - MARIADB_RANDOM_ROOT_PASSWORD=yes
      - MARIADB_DATABASE=tilt
      - MARIADB_USER=tilt
      - MARIADB_PASSWORD=this_is_not_secure_generate_something
    ports:
      - 3306:3306
    networks:
      tilt_network:
        ipv4_address: 172.50.0.4

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      - PMA_HOST=db
      - PMA_USER=tilt
      - PMA_PASSWORD=this_is_not_secure_generate_something
    ports:
      - 8081:80
    networks:
      tilt_network:
        ipv4_address: 172.50.0.5

  maildev:
    image: djfarrelly/maildev
    command: bin/maildev --incoming-user root@localhost --incoming-pass password --hide-extensions STARTTLS
    ports:
      - 8082:1080  # Admin UI
      - 2525:1025  # SMTP. Use 465:1025 to make nodemailer use encryption.
    networks:
      tilt_network:
        ipv4_address: 172.50.0.6

networks:
  tilt_network:
    ipam:
      config:
        - subnet: 172.50.0.0/16
